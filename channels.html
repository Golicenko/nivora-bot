<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Наши официальные каналы</title>

<style>

body{
margin:0;
padding:20px;
font-family:Arial, sans-serif;
background:linear-gradient(180deg,#0f0f0f,#1a1a1a);
color:white;
line-height:1.7;
}

.container{
max-width:700px;
margin:auto;
}

h1{
font-size:30px;
text-align:center;
margin-bottom:25px;
}

.block{
background:#1f1f1f;
padding:18px;
border-radius:12px;
margin-bottom:15px;
animation:fade 0.6s ease;
}

.button{
display:block;
text-align:center;
padding:14px;
margin-top:10px;
border-radius:10px;
background:#2ea6ff;
color:white;
text-decoration:none;
font-size:18px;
}

.button:hover{
background:#1d8ae0;
}

.youtube{
background:#ff3b3b;
}

.telegram{
background:#229ED9;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>🌐 Наши официальные каналы</h1>

<div class="block">

<p>
Здесь вы можете найти наши официальные страницы и каналы проекта AutoFlow.
Подписывайтесь чтобы следить за новостями, обновлениями и новыми видео.
</p>

</div>

<div class="block">

href="https://youtube.com/@autoflow01?si=1f6IQSRS_4pqMn8G">

</a>

</div>

<div class="block">

<b>📢 Telegram канал AutoFlow1</b>

href="https://t.me/AutoFlow1">

<div class="block">

Перейти в канал

</a>

</div>

</div>

</body>
</html>
